services:
  backend:
    image: python:latest
    container_name: hr-ai-backend
    working_dir: /workspace/backend
    volumes:
      - .:/workspace
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python run_migrations.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql://hradmin:hradmin123@db:5432/hr_platform
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_DB: hr_platform
      POSTGRES_USER: hradmin
      POSTGRES_PASSWORD: hradmin123
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: hradmin
      MINIO_SECRET_KEY: hradmin123
      MINIO_BUCKET: hr-content
      WEAVIATE_URL: http://weaviate:8080
      OLLAMA_BASE_URL: http://ollama:11434
    expose:
      - "8000"
    depends_on:
      - db
      - minio
      - weaviate
      - ollama

  frontend:
    image: node:latest
    container_name: hr-ai-frontend
    working_dir: /workspace/frontend
    volumes:
      - .:/workspace
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: ""
    expose:
      - "5173"
    depends_on:
      - backend

  nginx:
    image: nginx:latest
    container_name: hr-ai-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - backend
      - minio

  db:
    image: postgres:latest
    container_name: hr-ai-db
    environment:
      POSTGRES_DB: hr_platform
      POSTGRES_USER: hradmin
      POSTGRES_PASSWORD: hradmin123
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  minio:
    image: minio/minio:latest
    container_name: hr-ai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: hradmin
      MINIO_ROOT_PASSWORD: hradmin123
    volumes:
      - ./data/minio:/data
    ports:
      - "9001:9001"
      - "9000:9000"

  weaviate:
    image: semitechnologies/weaviate:1.27.0
    container_name: hr-ai-weaviate
    restart: unless-stopped
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: hr-ai-weaviate
    volumes:
      - ./data/weaviate:/var/lib/weaviate
    ports:
      - "8080:8080"
      - "50051:50051"

  ollama:
    image: ollama/ollama:latest
    container_name: hr-ai-ollama
    restart: unless-stopped
    volumes:
      - ./data/ollama:/root/.ollama
    ports:
      - "11434:11434"
