services:
  backend:
    image: python:3.12-slim
    container_name: hr-ai-backend
    working_dir: /workspace/backend
    volumes:
      - .:/workspace
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python run_migrations.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql://hradmin:hradmin123@db:5432/hr_platform
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_DB: hr_platform
      POSTGRES_USER: hradmin
      POSTGRES_PASSWORD: hradmin123
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: hradmin
      MINIO_SECRET_KEY: hradmin123
      MINIO_BUCKET: hr-content
      WEAVIATE_URL: http://weaviate:8080
      OLLAMA_BASE_URL: http://ollama:11434
      MINERU_URL: http://mineru:30000
      AUTH_MODE: mock
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: hr-ai
      KEYCLOAK_CLIENT_ID: hr-ai-frontend
      JWT_ISSUER: hr-ai-platform
      JWT_SECRET: hr-ai-dev-local-key
      DEMO_USER_LOGIN: depopova
      DEMO_USER_FULL_NAME: Дарья Попова
      DEMO_USER_ROLE: HR business partner
      DEMO_USER_DEPARTMENT: HR
    expose:
      - "8000"
    depends_on:
      - db
      - minio
      - weaviate
      - ollama
      - keycloak
      - mineru

  frontend:
    image: node:22
    container_name: hr-ai-frontend
    working_dir: /workspace/frontend
    volumes:
      - .:/workspace
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: ""
      VITE_KEYCLOAK_URL: http://localhost:8081
      VITE_KEYCLOAK_REALM: hr-ai
      VITE_KEYCLOAK_CLIENT_ID: hr-ai-frontend
    expose:
      - "5173"
    depends_on:
      - backend

  nginx:
    image: nginx:latest
    container_name: hr-ai-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - backend
      - minio

  db:
    image: postgres:16
    container_name: hr-ai-db
    environment:
      POSTGRES_DB: hr_platform
      POSTGRES_USER: hradmin
      POSTGRES_PASSWORD: hradmin123
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: hr-ai-keycloak
    command: start-dev --http-port=8080
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8081:8080"
    depends_on:
      - keycloak-db

  keycloak-db:
    image: postgres:16
    container_name: hr-ai-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - ./data/keycloak-postgres:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: hr-ai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: hradmin
      MINIO_ROOT_PASSWORD: hradmin123
    volumes:
      - ./data/minio:/data
    ports:
      - "9001:9001"
      - "9000:9000"

  weaviate:
    image: semitechnologies/weaviate:1.27.0
    container_name: hr-ai-weaviate
    restart: unless-stopped
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: hr-ai-weaviate
    volumes:
      - ./data/weaviate:/var/lib/weaviate
    ports:
      - "8080:8080"
      - "50051:50051"

  ollama:
    image: ollama/ollama:latest
    container_name: hr-ai-ollama
    restart: unless-stopped
    volumes:
      - ./data/ollama:/root/.ollama
    ports:
      - "11434:11434"

  mineru:
    image: ghcr.io/opendatalab/mineru:latest
    container_name: hr-ai-mineru
    restart: unless-stopped
    environment:
      MINERU_DEVICE_MODE: cpu
    volumes:
      - ./data/mineru:/data
    ports:
      - "30000:30000"
