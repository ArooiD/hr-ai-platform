services:
  backend:
    image: python:latest
    container_name: hr-ai-backend
    working_dir: /workspace/backend
    volumes:
      - .:/workspace
    command: sh -c "pip install -r requirements.txt && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql://hradmin:hradmin123@db:5432/hr_platform
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: hradmin
      MINIO_SECRET_KEY: hradmin123
      MINIO_BUCKET: hr-content
    expose:
      - "8000"
    depends_on:
      - db
      - minio

  frontend:
    image: node:latest
    container_name: hr-ai-frontend
    working_dir: /workspace/frontend
    volumes:
      - .:/workspace
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: ""
    expose:
      - "5173"
    depends_on:
      - backend

  nginx:
    image: nginx:latest
    container_name: hr-ai-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - backend
      - minio

  db:
    image: postgres:16-alpine
    container_name: hr-ai-db
    environment:
      POSTGRES_DB: hr_platform
      POSTGRES_USER: hradmin
      POSTGRES_PASSWORD: hradmin123
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./samples/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    ports:
      - "5432:5432"

  minio:
    image: minio/minio:latest
    container_name: hr-ai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: hradmin
      MINIO_ROOT_PASSWORD: hradmin123
    volumes:
      - ./data/minio:/data
    ports:
      - "9001:9001"
      - "9000:9000"

