services:
  backend:
    image: python:latest
    container_name: hr-ai-backend
    working_dir: /workspace/backend
    volumes:
      - .:/workspace
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: hradmin
      MINIO_SECRET_KEY: hradmin123
      MINIO_BUCKET: hr-content
    expose:
      - "8000"
    depends_on:
      - minio

  frontend:
    image: node:latest
    container_name: hr-ai-frontend
    working_dir: /workspace/frontend
    volumes:
      - .:/workspace
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: ""
    expose:
      - "5173"
    depends_on:
      - backend

  nginx:
    image: nginx:latest
    container_name: hr-ai-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - backend
      - minio

  minio:
    image: minio/minio:latest
    container_name: hr-ai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: hradmin
      MINIO_ROOT_PASSWORD: hradmin123
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"

volumes:
  minio_data:
